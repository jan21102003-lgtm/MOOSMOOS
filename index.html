    <title>MOOSMOOS | Gold of Green</title>
    <style>
:root {
  color-scheme: dark;
  --black: #080a08;
  --ink: #0d100d;
  --surface: #111411;
  --surface-lifted: #171a17;
  --white: #f5f2e9;
  --muted: #aaa89f;
  --gold: #b69142;
  --gold-bright: #d2b263;
  --green: #6b922b;
  --line: rgba(182, 145, 66, 0.72);
  --line-soft: rgba(182, 145, 66, 0.28);
  --shadow: 0 22px 58px rgba(0, 0, 0, 0.42);
  --focus: 0 0 0 3px rgba(210, 178, 99, 0.34);
  --font-condensed: "Arial Narrow", "Helvetica Neue Condensed", "Roboto Condensed", sans-serif;
  --font-sans: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: var(--black);
}

body {
  min-height: 100%;
  margin: 0;
  color: var(--white);
  font-family: var(--font-sans);
  background:
    linear-gradient(rgba(182, 145, 66, 0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(182, 145, 66, 0.025) 1px, transparent 1px),
    var(--black);
  background-size: 42px 42px;
}

button,
input {
  font: inherit;
}

a {
  color: inherit;
}

.skip-link {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 20;
  transform: translateY(-150%);
  border: 1px solid var(--gold);
  border-radius: 4px;
  padding: 10px 14px;
  color: var(--black);
  background: var(--white);
  font-weight: 750;
  text-decoration: none;
  transition: transform 160ms ease;
}

.skip-link:focus {
  transform: translateY(0);
}

.page-shell {
  position: relative;
  width: min(100%, 480px);
  min-height: 100vh;
  margin: 0 auto;
  padding: 16px 16px 36px;
  background: var(--ink);
  box-shadow: var(--shadow);
}

.profile-block {
  text-align: center;
}

.hero-media {
  position: relative;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 4px;
  background: #10130f;
}

.hero-media::after {
  position: absolute;
  inset: 0;
  content: "";
  pointer-events: none;
  background: linear-gradient(180deg, rgba(0, 0, 0, 0.06) 46%, rgba(4, 6, 4, 0.78) 100%);
}

.hero-media > img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

.wordmark {
  position: absolute;
  right: 22px;
  bottom: 22px;
  left: 22px;
  z-index: 1;
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 16px 14px 14px;
  color: var(--white);
  background: rgba(5, 7, 5, 0.82);
  backdrop-filter: blur(8px);
}

.wordmark h1 {
  margin: 0;
}

.brand-logo {
  display: block;
  width: 100%;
  height: auto;
}

.wordmark > span {
  display: block;
  margin-top: 12px;
  color: var(--gold-bright);
  font-family: var(--font-condensed);
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: 0.28em;
  text-transform: uppercase;
}

.tagline {
  margin: 28px 0 0;
  font-family: var(--font-condensed);
  font-size: clamp(27px, 8vw, 38px);
  font-weight: 400;
  line-height: 1.04;
  letter-spacing: 0;
}

.location-line {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 12px 0 0;
  color: var(--gold-bright);
  font-family: var(--font-condensed);
  font-size: 14px;
  line-height: 1.35;
}

.location-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 5px rgba(107, 146, 43, 0.12);
}

.link-list {
  display: grid;
  gap: 9px;
  margin-top: 30px;
}

.link-card,
.featured-link {
  display: grid;
  grid-template-columns: 44px minmax(0, 1fr) 22px;
  align-items: center;
  min-height: 67px;
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 10px 14px;
  text-decoration: none;
  transition:
    transform 160ms ease,
    border-color 160ms ease,
    background-color 160ms ease,
    box-shadow 160ms ease;
}

.link-card {
  color: var(--white);
  background: rgba(17, 20, 17, 0.84);
}

.link-card:hover {
  transform: translateY(-2px);
  border-color: var(--gold-bright);
  background: var(--surface-lifted);
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
}

.link-icon,
.featured-icon,
.arrow-icon,
.featured-arrow,
.share-save-icon {
  display: inline-grid;
  place-items: center;
}

.link-icon {
  width: 34px;
  height: 34px;
  color: var(--gold-bright);
}

.link-text {
  min-width: 0;
  font-family: var(--font-condensed);
  font-size: 18px;
  font-weight: 650;
  line-height: 1.15;
}

.icon {
  display: block;
  width: 24px;
  height: 24px;
}

.featured-link {
  margin-top: 13px;
  color: #11130f;
  background: var(--white);
  font-family: var(--font-condensed);
  font-size: 16px;
  font-weight: 850;
  line-height: 1.15;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
}

.featured-link:hover {
  transform: translateY(-2px);
  background: #ffffff;
  box-shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
}

.featured-icon,
.featured-arrow {
  color: var(--gold);
}

.contact-actions {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  margin-top: 25px;
}

.contact-link {
  display: grid;
  place-items: center;
  gap: 8px;
  min-width: 0;
  border-right: 1px solid var(--line);
  padding: 6px 4px;
  color: var(--white);
  font-family: var(--font-condensed);
  font-size: 13px;
  line-height: 1;
  text-decoration: none;
  transition: color 160ms ease;
}

.contact-link:last-child {
  border-right: 0;
}

.contact-link:hover {
  color: var(--gold-bright);
}

.contact-link .icon {
  width: 28px;
  height: 28px;
  color: var(--gold-bright);
}

.share-save {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  margin-top: 24px;
  border: 0;
  border-top: 1px solid var(--line-soft);
  border-bottom: 1px solid var(--line-soft);
  padding: 14px;
  color: var(--muted);
  background: transparent;
  font-family: var(--font-condensed);
  font-size: 13px;
  font-weight: 750;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
}

.share-save:hover {
  color: var(--white);
}

.shop-teaser {
  display: grid;
  grid-template-columns: 42% 58%;
  min-height: 180px;
  margin-top: 26px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 4px;
  background: var(--surface);
}

.shop-teaser > img {
  width: 100%;
  height: 100%;
  min-height: 180px;
  object-fit: cover;
  object-position: center;
}

.shop-content {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  padding: 18px;
}

.shop-content > p {
  margin: 0 0 8px;
  color: var(--gold-bright);
  font-family: var(--font-condensed);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.13em;
  text-transform: uppercase;
}

.shop-content h2 {
  margin: 0;
  font-family: var(--font-condensed);
  font-size: 26px;
  font-weight: 500;
  line-height: 1;
  letter-spacing: 0;
}

.shop-content a {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-top: 18px;
  border: 1px solid var(--gold);
  border-radius: 3px;
  padding: 10px 12px;
  font-family: var(--font-condensed);
  font-size: 12px;
  font-weight: 850;
  letter-spacing: 0.11em;
  text-decoration: none;
  text-transform: uppercase;
}

.shop-content a span {
  width: 7px;
  height: 7px;
  transform: rotate(45deg);
  border-top: 1px solid var(--gold-bright);
  border-right: 1px solid var(--gold-bright);
}

.site-footer {
  margin-top: 24px;
  color: #777a72;
  font-size: 10px;
  line-height: 1.55;
  text-align: center;
}

.site-footer p {
  margin: 0;
}

.toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 30;
  max-width: min(320px, calc(100vw - 36px));
  transform: translateY(16px);
  border: 1px solid var(--gold);
  border-radius: 4px;
  padding: 12px 14px;
  color: var(--black);
  background: var(--white);
  box-shadow: var(--shadow);
  font-size: 13px;
  font-weight: 750;
  opacity: 0;
  pointer-events: none;
  transition:
    opacity 170ms ease,
    transform 170ms ease;
}

.toast.is-visible {
  transform: translateY(0);
  opacity: 1;
}

.link-card:focus-visible,
.featured-link:focus-visible,
.contact-link:focus-visible,
.share-save:focus-visible,
.shop-content a:focus-visible {
  outline: none;
  box-shadow: var(--focus);
}

@media (min-width: 760px) {
  body {
    padding: 30px 0;
  }

  .page-shell {
    border: 1px solid rgba(182, 145, 66, 0.35);
    border-radius: 5px;
  }
}

@media (max-width: 380px) {
  .page-shell {
    padding-right: 12px;
    padding-left: 12px;
  }

  .wordmark {
    right: 14px;
    bottom: 14px;
    left: 14px;
  }

  .wordmark > span {
    margin-top: 10px;
    font-size: 11px;
  }

  .location-line {
    font-size: 12px;
  }

  .link-card,
  .featured-link {
    grid-template-columns: 38px minmax(0, 1fr) 18px;
    padding-right: 11px;
    padding-left: 10px;
  }

  .link-text {
    font-size: 16px;
  }

  .featured-link {
    font-size: 14px;
  }

  .shop-content {
    padding: 14px;
  }

  .shop-content h2 {
    font-size: 22px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
}

  },

const contacts = [
  { label: "Website", url: "https://moosmoos.de/", icon: "globe" },
  { label: "E-Mail", url: "mailto:moos@moosmoos.de", icon: "mail" },
  { label: "Telefon", url: "tel:+4935872359210", icon: "phone" }
];

const linkList = document.querySelector("#links");
const contactActions = document.querySelector("#contactActions");
const featuredIcon = document.querySelector(".featured-icon");
const featuredArrow = document.querySelector(".featured-arrow");
const copyButton = document.querySelector("#copyButton");
const copyButtonText = document.querySelector("#copyButtonText");
const shareSaveIcon = document.querySelector(".share-save-icon");
const toast = document.querySelector("#toast");

let toastTimer;

function renderLinks() {
  const fragment = document.createDocumentFragment();

  links.forEach((item) => {
    const anchor = document.createElement("a");
    anchor.className = "link-card";
    anchor.href = item.url;
    anchor.target = item.url.startsWith("mailto:") ? "_self" : "_blank";
    anchor.rel = "noopener noreferrer";
    anchor.setAttribute("aria-label", item.label);
    anchor.innerHTML = `
      <span class="link-icon" aria-hidden="true">${icons[item.icon]}</span>
      <span class="link-text">${item.label}</span>
      <span class="arrow-icon" aria-hidden="true">${icons.chevron}</span>
    `;
    fragment.append(anchor);
  });

  linkList.append(fragment);
}

function renderContacts() {
  const fragment = document.createDocumentFragment();

  contacts.forEach((item) => {
    const anchor = document.createElement("a");
    anchor.className = "contact-link";
    anchor.href = item.url;
    anchor.target = item.url.startsWith("http") ? "_blank" : "_self";
    anchor.rel = "noopener noreferrer";
    anchor.setAttribute("aria-label", item.label);
    anchor.innerHTML = `${icons[item.icon]}<span>${item.label}</span>`;
    fragment.append(anchor);
  });

  contactActions.append(fragment);
}

function showToast(message) {
  clearTimeout(toastTimer);
  toast.textContent = message;
  toast.classList.add("is-visible");
  toastTimer = window.setTimeout(() => toast.classList.remove("is-visible"), 2400);
}

async function sharePage() {
  const shareData = {
    title: "MOOSMOOS | Gold of Green",
    text: "Exklusive Luxusprodukte aus Moos.",
    url: window.location.href
  };

  if (navigator.share) {
    try {
      await navigator.share(shareData);
      showToast("Link geteilt.");
      return;
    } catch (error) {
      if (error.name === "AbortError") return;
    }
  }

  try {
    await navigator.clipboard.writeText(shareData.url);
    showToast("Link kopiert.");
  } catch {
    const fallback = document.createElement("input");
    fallback.value = shareData.url;
    fallback.setAttribute("readonly", "");
    fallback.style.position = "fixed";
    fallback.style.opacity = "0";
    document.body.append(fallback);
    fallback.select();
    document.execCommand("copy");
    fallback.remove();
    showToast("Link kopiert.");
  }
}

renderLinks();
renderContacts();
featuredIcon.innerHTML = icons.edit;
featuredArrow.innerHTML = icons.chevron;
shareSaveIcon.innerHTML = icons.share;

copyButton.addEventListener("click", async () => {
  await sharePage();
  copyButtonText.textContent = "Link kopiert";
  window.setTimeout(() => {
    copyButtonText.textContent = "Link teilen";
  }, 1600);
});
